CONFIG_NICE_VIEW_WIDGET_INVERTED=y

# Touchpad / pointing
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# Battery reporting (central side fetches right-half level too)
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Power management — fixes right-half battery drain (1.7mA → 0.23µA idle)
# See: https://github.com/beekeeb/zmk-keyboard-toucan Jan 2026 fix
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=300000
