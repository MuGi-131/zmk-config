manifest:
  defaults:
    revision: v0.3
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: caksoylar
      url-base: https://github.com/caksoylar
    - name: geeksville
      url-base: https://github.com/geeksville
  projects:
    - name: zmk
      remote: zmkfirmware
      import: app/west.yml
    - name: zmk-keyboard-toucan
      url: https://github.com/MuGi-131/zmk-keyboard-toucan
      revision: main
      path: modules/zmk-keyboard-toucan
    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: v0.3
    - name: cirque-input-module
      remote: geeksville
      revision: toucan
  self:
    path: config
