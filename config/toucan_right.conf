# Touchpad / pointing
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# Battery reporting (peripheral — no fetching/proxy, just local reporting)
CONFIG_ZMK_BATTERY_REPORTING=y

# Power management — fixes right-half battery drain (1.7mA → 0.23µA idle)
# See: https://github.com/beekeeb/zmk-keyboard-toucan Jan 2026 fix
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_PM_SOFT_OFF=y
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Optional: CONFIG_ZMK_INPUT_PINNACLE_IDLE_SLEEPER=y would cut touchpad
# power further (1.7mA → 40µA) but adds a 300ms wake delay on first touch.
# Disabled by default — uncomment if battery life matters more than instant touch.
